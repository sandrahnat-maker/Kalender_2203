<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Daily Dozen Checklist</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');

:root {
  --bg: #F7F4EF;
  --card: #FFFFFF;
  --text: #1C1C1E;
  --muted: #6B6B6B;
  --accent: #4A7C59;
  --accent2: #8B6020;
  --tick-off: #D6E8DC;
  --tick-on: #4A7C59;
  --border: rgba(0,0,0,0.07);
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 5rem;
}

header {
  background: var(--text);
  color: var(--bg);
  padding: 1rem 1rem 0.8rem;
  position: sticky;
  top: 0;
  z-index: 10;
}

.header-top {
  display: flex;
  align-items: baseline;
  justify-content: space-between;
  margin-bottom: 0.5rem;
}

h1 {
  font-family: 'DM Serif Display', serif;
  font-size: 1.2rem;
  font-weight: 400;
  letter-spacing: 0.01em;
}

.date-label {
  font-size: 0.6rem;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: #aaa;
}

.progress-bar-wrap {
  height: 3px;
  background: rgba(255,255,255,0.15);
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  background: #8fc9a0;
  border-radius: 2px;
  transition: width 0.35s ease;
}

.progress-label {
  font-size: 0.58rem;
  color: #8fc9a0;
  margin-top: 0.3rem;
  text-align: right;
}

main {
  max-width: 560px;
  margin: 0 auto;
  padding: 0.8rem 0.75rem;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}

.category-card {
  background: var(--card);
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: var(--shadow);
  transition: opacity 0.2s;
}

.category-card.all-done {
  opacity: 0.6;
}

.cat-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.55rem 0.85rem 0.45rem;
  border-bottom: 1px solid var(--border);
}

.cat-title {
  font-size: 0.82rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 0.35rem;
}

.cat-emoji { font-size: 1rem; }

.cat-count {
  font-size: 0.58rem;
  color: var(--muted);
  font-weight: 400;
  letter-spacing: 0.05em;
}

.portions {
  padding: 0.45rem 0.85rem 0.5rem;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
}

.portion-row {
  display: flex;
  align-items: center;
  gap: 0.55rem;
  cursor: pointer;
  padding: 0.28rem 0.3rem;
  border-radius: 7px;
  transition: background 0.12s;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}

.portion-row:active { background: rgba(74,124,89,0.06); }

.checkbox {
  width: 20px;
  height: 20px;
  border-radius: 6px;
  border: 1.8px solid #ccc;
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.18s;
  background: white;
}

.portion-row.checked .checkbox {
  background: var(--tick-on);
  border-color: var(--tick-on);
}

.checkbox::after {
  content: '';
  width: 5px;
  height: 9px;
  border: 2px solid white;
  border-top: none;
  border-left: none;
  transform: rotate(45deg) translateY(-1px);
  opacity: 0;
  transition: opacity 0.15s;
}

.portion-row.checked .checkbox::after { opacity: 1; }

.portion-label {
  font-size: 0.75rem;
  color: var(--text);
  line-height: 1.3;
  transition: color 0.15s;
}

.portion-sub {
  font-size: 0.62rem;
  color: var(--muted);
  margin-top: 0.05rem;
}

.portion-row.checked .portion-label {
  color: var(--muted);
  text-decoration: line-through;
  text-decoration-color: #aaa;
}

.portion-dots {
  display: flex;
  gap: 3px;
  margin-left: auto;
  flex-shrink: 0;
}

.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: #ddd;
  transition: background 0.15s;
}

.dot.filled { background: var(--tick-on); }

/* note box */
.cat-note {
  font-size: 0.63rem;
  color: var(--accent2);
  padding: 0 0.85rem 0.45rem;
  line-height: 1.5;
}

/* warning box */
.warning-box {
  background: #FFF8EE;
  border: 1px solid #f0d4a0;
  border-radius: 10px;
  padding: 0.65rem 0.85rem;
  font-size: 0.68rem;
  color: #8B6020;
  line-height: 1.6;
  margin-top: 0.3rem;
}

.warning-box strong { display: block; margin-bottom: 0.2rem; font-size: 0.7rem; }

/* reset button */
.reset-wrap {
  text-align: center;
  margin-top: 0.5rem;
}

.reset-btn {
  background: transparent;
  border: 1.5px solid #ccc;
  border-radius: 20px;
  padding: 0.4rem 1.2rem;
  font-size: 0.68rem;
  font-family: 'DM Sans', sans-serif;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.15s;
}
.reset-btn:active { background: #f0ebe2; color: var(--text); }

.done-banner {
  background: #E8F5EE;
  border: 1px solid #b8ddc0;
  border-radius: 10px;
  text-align: center;
  padding: 0.8rem;
  font-size: 0.78rem;
  color: #2E7D4F;
  font-weight: 600;
  display: none;
}

.done-banner.show { display: block; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>✅ Daily Dozen</h1>
    <span class="date-label" id="dateLabel"></span>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:0%"></div>
  </div>
  <div class="progress-label" id="progressLabel">0 / 0 Portionen</div>
</header>

<main id="main">
<!-- cards injected by JS -->
</main>

<script>
const CATEGORIES = [
  {
    id:'beeren', emoji:'🫐', title:'Beeren', portions:1,
    labels:['½ Tasse Beeren'],
    sub:['Heidelbeeren · Himbeeren · Erdbeeren · Brombeeren'],
    note:'→ Frühstück oder Snack'
  },
  {
    id:'obst', emoji:'🍎', title:'Obst', portions:3,
    labels:['Portion Obst 1','Portion Obst 2','Portion Obst 3'],
    sub:['Apfel / Birne / Orange / Kiwi','Apfel / Birne / Orange / Kiwi','Apfel / Birne / Orange / Kiwi'],
    note:'→ Vormittag + Nachmittag + Frühstück'
  },
  {
    id:'kreuz', emoji:'🥦', title:'Kreuzblütler', portions:1,
    labels:['1 Portion Kreuzblütler'],
    sub:['Brokkoli · Rucola · Radieschen · Kohl'],
    note:'→ in Bowl oder Abendessen'
  },
  {
    id:'blatt', emoji:'🥬', title:'Blattgemüse', portions:2,
    labels:['1 Tasse Blattgemüse roh','1 Tasse Blattgemüse roh'],
    sub:['Spinat · Rucola · Feldsalat · Mangold','Spinat · Rucola · Feldsalat · Mangold'],
    note:'→ Mittagsbowl + Abendessen'
  },
  {
    id:'gemüse', emoji:'🥕', title:'Anderes Gemüse', portions:2,
    labels:['Portion Gemüse 1','Portion Gemüse 2'],
    sub:['Karotte · Paprika · Zucchini · Kürbis · Tomate','Karotte · Paprika · Zucchini · Kürbis · Tomate'],
    note:'→ Mittag + Abend'
  },
  {
    id:'hülsen', emoji:'🫘', title:'Hülsenfrüchte', portions:3,
    labels:['½ Tasse Hülsenfrüchte','½ Tasse Hülsenfrüchte','½ Tasse Hülsenfrüchte'],
    sub:['Linsen · Kichererbsen · Bohnen · Hummus','Linsen · Kichererbsen · Bohnen · Hummus','Linsen · Kichererbsen · Bohnen · Hummus'],
    note:'→ Mittagsbowl + Abendessen + Snack (Hummus)'
  },
  {
    id:'nüsse', emoji:'🌰', title:'Nüsse & Samen', portions:1,
    labels:['1 Portion Nüsse / Samen'],
    sub:['Walnüsse · Mandeln · Leinsamen · Chiasamen · Sesam'],
    note:'⚠️ Walnüsse besonders gut für LDL & Blutdruck'
  },
  {
    id:'vollkorn', emoji:'🌾', title:'Vollkorn', portions:3,
    labels:['Portion Vollkorn 1','Portion Vollkorn 2','Portion Vollkorn 3'],
    sub:['Haferflocken · Vollkornbrot · Quinoa · Hirse','Haferflocken · Vollkornbrot · Quinoa · Hirse','Haferflocken · Vollkornbrot · Quinoa · Hirse'],
    note:'→ Frühstück (Hafer) + Mittag (Bowl) + Abend (Brot)'
  },
  {
    id:'kräuter', emoji:'🌿', title:'Kräuter & Gewürze', portions:1,
    labels:['Kurkuma / Ingwer / Knoblauch / Kräuter'],
    sub:['Kurkuma + Pfeffer kombinieren für stärkere Wirkung'],
    note:'→ täglich in Kochen einbauen'
  },
  {
    id:'wasser', emoji:'💧', title:'Getränke', portions:5,
    labels:['Glas 1','Glas 2','Glas 3','Glas 4','Glas 5'],
    sub:['Wasser / Hibiskustee / Grüntee','Wasser / Hibiskustee / Grüntee','Wasser / Hibiskustee / Grüntee','Wasser / Hibiskustee / Grüntee','Wasser / Hibiskustee / Grüntee'],
    note:'⚠️ Hibiskustee senkt Blutdruck · max. 1–2 Kaffee/Tag'
  },
  {
    id:'vitamine', emoji:'💊', title:'B12 & Vit. D', portions:1,
    labels:['B12 + Vitamin D genommen'],
    sub:['B12 mit Frühstück · Vit. D mit fetthaltiger Mahlzeit'],
    note:'→ bereits im Medikamentenplan'
  },
  {
    id:'bewegung', emoji:'🏃', title:'Bewegung', portions:1,
    labels:['Bewegung heute'],
    sub:['Spaziergang Lotte · Muskeltraining · Yoga · Balanceboard'],
    note:'→ bereits im Kalender'
  }
];

const STORAGE_KEY = 'dailydozen_v1';
const today = new Date().toISOString().slice(0,10);

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return {};
    const data = JSON.parse(raw);
    if (data.date !== today) return {};
    return data.checks || {};
  } catch(e) { return {}; }
}

function saveState(checks) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ date: today, checks }));
}

let state = loadState();

function getChecked(catId, idx) {
  return !!(state[catId] && state[catId][idx]);
}

function toggle(catId, idx) {
  if (!state[catId]) state[catId] = {};
  state[catId][idx] = !state[catId][idx];
  saveState(state);
  renderAll();
}

function totalPortions() {
  return CATEGORIES.reduce((s,c) => s + c.portions, 0);
}

function donePortions() {
  let n = 0;
  CATEGORIES.forEach(c => {
    for (let i=0;i<c.portions;i++) if(getChecked(c.id,i)) n++;
  });
  return n;
}

function renderAll() {
  const main = document.getElementById('main');
  const done = donePortions();
  const total = totalPortions();
  const pct = total ? Math.round(done/total*100) : 0;

  document.getElementById('progressBar').style.width = pct+'%';
  document.getElementById('progressLabel').textContent = done + ' / ' + total + ' Portionen';

  main.innerHTML = '';

  CATEGORIES.forEach(c => {
    const checkedCount = Array.from({length:c.portions},(_,i)=>getChecked(c.id,i)).filter(Boolean).length;
    const allDone = checkedCount === c.portions;

    const card = document.createElement('div');
    card.className = 'category-card' + (allDone ? ' all-done' : '');

    // dots indicator
    const dotsHtml = Array.from({length:c.portions},(_,i)=>
      `<div class="dot${getChecked(c.id,i)?' filled':''}"></div>`
    ).join('');

    let portionsHtml = '';
    for(let i=0;i<c.portions;i++){
      const checked = getChecked(c.id,i);
      portionsHtml += `
        <div class="portion-row${checked?' checked':''}" onclick="toggle('${c.id}',${i})">
          <div class="checkbox"></div>
          <div class="mc">
            <div class="portion-label">${c.labels[i]}</div>
            ${c.sub && c.sub[i] ? `<div class="portion-sub">${c.sub[i]}</div>` : ''}
          </div>
        </div>`;
    }

    card.innerHTML = `
      <div class="cat-header">
        <div class="cat-title">
          <span class="cat-emoji">${c.emoji}</span>
          ${c.title}
        </div>
        <div style="display:flex;align-items:center;gap:0.5rem">
          <span class="cat-count">${checkedCount}/${c.portions}</span>
          <div class="portion-dots">${dotsHtml}</div>
        </div>
      </div>
      <div class="portions">${portionsHtml}</div>
      ${c.note ? `<div class="cat-note">${c.note}</div>` : ''}
    `;

    main.appendChild(card);
  });

  // warning box
  const warn = document.createElement('div');
  warn.className = 'warning-box';
  warn.innerHTML = `<strong>⚠️ Blutdruck & Cholesterin</strong>Kein extra Salz · wenig Käse (max. 2–3×/Woche) · kein Kokosöl · Olivenöl bevorzugen · Walnüsse täglich · Hibiskustee täglich · Leinsamen täglich`;
  main.appendChild(warn);

  // done banner
  const banner = document.createElement('div');
  banner.className = 'done-banner' + (done===total ? ' show' : '');
  banner.textContent = '🎉 Alle Portionen für heute geschafft!';
  main.appendChild(banner);

  // reset button
  const resetWrap = document.createElement('div');
  resetWrap.className = 'reset-wrap';
  resetWrap.innerHTML = `<button class="reset-btn" onclick="resetAll()">↺ Zurücksetzen</button>`;
  main.appendChild(resetWrap);
}

function resetAll() {
  state = {};
  saveState(state);
  renderAll();
}

// date label
const d = new Date();
const days = ['So','Mo','Di','Mi','Do','Fr','Sa'];
const months = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
document.getElementById('dateLabel').textContent =
  days[d.getDay()] + ' ' + d.getDate() + '. ' + months[d.getMonth()];

renderAll();
</script>
</body>
</html>
