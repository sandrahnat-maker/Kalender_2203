<!DOCTYPE html><html lang="de"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');:root{--bg:#F7F4EF;--card:#FFFFFF;--text:#1C1C1E;--muted:#6B6B6B;--accent:#4A7C59;--accent2:#8B6020;--border:rgba(0,0,0,0.07);--shadow:0 1px 4px rgba(0,0,0,0.06);}*{margin:0;padding:0;box-sizing:border-box;}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:4rem;}header{background:#1C1C1E;color:var(--bg);padding:.85rem 1rem .6rem;position:sticky;top:0;z-index:10;}.header-top{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:.4rem;}h1{font-family:'DM Serif Display',serif;font-size:1.15rem;font-weight:400;}.date-label{font-size:.58rem;text-transform:uppercase;letter-spacing:.12em;color:#aaa;}.pb-wrap{height:3px;background:rgba(255,255,255,.15);border-radius:2px;overflow:hidden;}.pb{height:100%;background:#8fc9a0;border-radius:2px;transition:width .35s;}.pl{font-size:.56rem;color:#8fc9a0;margin-top:.25rem;text-align:right;}main{max-width:540px;margin:0 auto;padding:.7rem .7rem;display:flex;flex-direction:column;gap:.45rem;}.card{background:var(--card);border-radius:11px;overflow:hidden;border:1px solid var(--border);box-shadow:var(--shadow);transition:opacity .2s;}.card.all-done{opacity:.55;}.cat-hdr{display:flex;align-items:center;justify-content:space-between;padding:.5rem .8rem .4rem;border-bottom:1px solid var(--border);}.cat-title{font-size:.8rem;font-weight:600;display:flex;align-items:center;gap:.3rem;}.cat-emoji{font-size:.95rem;}.cat-cnt{font-size:.57rem;color:var(--muted);}.portions{padding:.4rem .8rem .45rem;display:flex;flex-direction:column;gap:.28rem;}.prow{display:flex;align-items:center;gap:.5rem;cursor:pointer;padding:.25rem .25rem;border-radius:7px;transition:background .12s;user-select:none;-webkit-tap-highlight-color:transparent;}.prow:active{background:rgba(74,124,89,.06);}.cb{width:19px;height:19px;border-radius:5px;border:1.7px solid #ccc;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .18s;background:#fff;}.prow.chk .cb{background:var(--accent);border-color:var(--accent);}.cb::after{content:'';width:4px;height:8px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translateY(-1px);opacity:0;transition:opacity .15s;}.prow.chk .cb::after{opacity:1;}.pl2{font-size:.73rem;line-height:1.3;transition:color .15s;}.psub{font-size:.6rem;color:var(--muted);margin-top:.03rem;}.prow.chk .pl2{color:var(--muted);text-decoration:line-through;text-decoration-color:#bbb;}.dots{display:flex;gap:3px;margin-left:auto;flex-shrink:0;}.dot{width:6px;height:6px;border-radius:50%;background:#ddd;transition:background .15s;}.dot.f{background:var(--accent);}.cat-note{font-size:.62rem;color:var(--accent2);padding:0 .8rem .4rem;line-height:1.5;}.warn{background:#FFF8EE;border:1px solid #f0d4a0;border-radius:10px;padding:.6rem .8rem;font-size:.66rem;color:#8B6020;line-height:1.6;margin-top:.2rem;}.warn strong{display:block;margin-bottom:.15rem;font-size:.68rem;}.reset-wrap{text-align:center;margin-top:.4rem;}.reset-btn{background:transparent;border:1.5px solid #ccc;border-radius:20px;padding:.35rem 1rem;font-size:.66rem;font-family:'DM Sans',sans-serif;color:var(--muted);cursor:pointer;}.done-banner{background:#E8F5EE;border:1px solid #b8ddc0;border-radius:10px;text-align:center;padding:.7rem;font-size:.76rem;color:#2E7D4F;font-weight:600;display:none;}.done-banner.show{display:block;}</style></head><body><header><div class="header-top"><h1>✅ Daily Dozen</h1><span class="date-label" id="dl"></span></div><div class="pb-wrap"><div class="pb" id="pb" style="width:0%"></div></div><div class="pl" id="plbl">0 / 0</div></header><main id="main"></main><script>var C=[{id:'beeren',emoji:'🫐',title:'Beeren',p:1,lbl:['½ Tasse Beeren'],sub:['Heidelbeeren · Himbeeren · Erdbeeren · Brombeeren'],note:'→ Frühstück oder Snack'},{id:'obst',emoji:'🍎',title:'Obst',p:3,lbl:['Portion Obst 1','Portion Obst 2','Portion Obst 3'],sub:['Apfel / Birne / Orange / Kiwi','Apfel / Birne / Orange / Kiwi','Apfel / Birne / Orange / Kiwi'],note:'→ Vormittag + Nachmittag + Frühstück'},{id:'kreuz',emoji:'🥦',title:'Kreuzblütler',p:1,lbl:['1 Portion Kreuzblütler'],sub:['Brokkoli · Rucola · Radieschen · Kohl'],note:'→ in Bowl oder Abendessen'},{id:'blatt',emoji:'🥬',title:'Blattgemüse',p:2,lbl:['1 Tasse Blattgemüse','1 Tasse Blattgemüse'],sub:['Spinat · Rucola · Feldsalat · Mangold','Spinat · Rucola · Feldsalat · Mangold'],note:'→ Mittagsbowl + Abendessen'},{id:'gemüse',emoji:'🥕',title:'Anderes Gemüse',p:2,lbl:['Portion Gemüse 1','Portion Gemüse 2'],sub:['Karotte · Paprika · Zucchini · Kürbis · Tomate','Karotte · Paprika · Zucchini · Kürbis · Tomate'],note:'→ Mittag + Abend'},{id:'hülsen',emoji:'🫘',title:'Hülsenfrüchte',p:3,lbl:['½ Tasse Hülsenfrüchte','½ Tasse Hülsenfrüchte','½ Tasse Hülsenfrüchte'],sub:['Linsen · Kichererbsen · Bohnen · Hummus','Linsen · Kichererbsen · Bohnen · Hummus','Linsen · Kichererbsen · Bohnen · Hummus'],note:'→ Mittagsbowl + Abendessen + Snack (Hummus)'},{id:'nüsse',emoji:'🌰',title:'Nüsse & Samen',p:1,lbl:['1 Portion Nüsse / Samen'],sub:['Walnüsse · Mandeln · Leinsamen · Chiasamen · Sesam'],note:'⚠️ Walnüsse besonders gut für LDL & Blutdruck'},{id:'vollkorn',emoji:'🌾',title:'Vollkorn',p:3,lbl:['Portion Vollkorn 1','Portion Vollkorn 2','Portion Vollkorn 3'],sub:['Haferflocken · Vollkornbrot · Quinoa · Hirse','Haferflocken · Vollkornbrot · Quinoa · Hirse','Haferflocken · Vollkornbrot · Quinoa · Hirse'],note:'→ Frühstück (Hafer) + Mittag (Bowl) + Abend (Brot)'},{id:'kräuter',emoji:'🌿',title:'Kräuter & Gewürze',p:3,lbl:['Kurkuma','Gewürz','Gewürz'],sub:['Kurkuma + Pfeffer kombinieren','Ingwer · Knoblauch · Zimt · Chili','Ingwer · Knoblauch · Zimt · Chili'],note:'→ täglich beim Kochen'},{id:'wasser',emoji:'💧',title:'Getränke',p:5,lbl:['Glas 1','Glas 2','Glas 3','Glas 4','Glas 5'],sub:['Wasser / Hibiskustee / Grüntee','Wasser / Hibiskustee / Grüntee','Wasser / Hibiskustee / Grüntee','Wasser / Hibiskustee / Grüntee','Wasser / Hibiskustee / Grüntee'],note:'⚠️ Hibiskustee senkt Blutdruck · max. 1–2 Kaffee/Tag'},{id:'vitamine',emoji:'💊',title:'B12 & Vit. D',p:1,lbl:['B12 + Vitamin D genommen'],sub:['B12 mit Frühstück · Vit. D mit fetthaltiger Mahlzeit'],note:'→ bereits im Medikamentenplan'},{id:'bewegung',emoji:'🏃',title:'Bewegung',p:1,lbl:['Bewegung heute'],sub:['Spaziergang Lotte · Muskeltraining · Yoga · Balanceboard'],note:'→ bereits im Kalender'}];var SK='dailydozen_v1';var today=new Date().toISOString().slice(0,10);function load(){try{var r=localStorage.getItem(SK);if(!r)return{};var d=JSON.parse(r);if(d.date!==today)return{};return d.checks||{};}catch(e){return{};}}function save(s){localStorage.setItem(SK,JSON.stringify({date:today,checks:s}));}var S=load();function gc(id,i){return!!(S[id]&&S[id][i]);}function toggle(id,i){if(!S[id])S[id]={};S[id][i]=!S[id][i];save(S);renderAll();}function total(){return C.reduce(function(a,c){return a+c.p;},0);}function done(){var n=0;C.forEach(function(c){for(var i=0;i<c.p;i++)if(gc(c.id,i))n++;});return n;}function renderAll(){var m=document.getElementById('main');var dn=done(),tot=total(),pct=tot?Math.round(dn/tot*100):0;document.getElementById('pb').style.width=pct+'%';document.getElementById('plbl').textContent=dn+' / '+tot+' Portionen';m.innerHTML='';C.forEach(function(c){var cc=0;for(var i=0;i<c.p;i++)if(gc(c.id,i))cc++;var allD=cc===c.p;var card=document.createElement('div');card.className='card'+(allD?' all-done':'');var dots=Array.from({length:c.p},function(_,i){return'<div class="dot'+(gc(c.id,i)?' f':'')+'"></div>';}).join('');var rows='';for(var i=0;i<c.p;i++){var ck=gc(c.id,i);rows+='<div class="prow'+(ck?' chk':'')+'" onclick="toggle(\''+c.id+'\','+i+')"><div class="cb"></div><div style="flex:1"><div class="pl2">'+c.lbl[i]+'</div>'+(c.sub&&c.sub[i]?'<div class="psub">'+c.sub[i]+'</div>':'')+'</div></div>';}card.innerHTML='<div class="cat-hdr"><div class="cat-title"><span class="cat-emoji">'+c.emoji+'</span>'+c.title+'</div><div style="display:flex;align-items:center;gap:.4rem"><span class="cat-cnt">'+cc+'/'+c.p+'</span><div class="dots">'+dots+'</div></div></div><div class="portions">'+rows+'</div>'+(c.note?'<div class="cat-note">'+c.note+'</div>':'');m.appendChild(card);});var w=document.createElement('div');w.className='warn';w.innerHTML='<strong>⚠️ Blutdruck & Cholesterin</strong>Kein extra Salz · wenig Käse (max. 2–3×/Woche) · kein Kokosöl · Olivenöl · Walnüsse täglich · Hibiskustee täglich · Leinsamen täglich';m.appendChild(w);var b=document.createElement('div');b.className='done-banner'+(dn===tot?' show':'');b.textContent='🎉 Alle Portionen für heute geschafft!';m.appendChild(b);var rw=document.createElement('div');rw.className='reset-wrap';rw.innerHTML='<button class="reset-btn" onclick="resetAll()">↺ Zurücksetzen</button>';m.appendChild(rw);}function resetAll(){S={};save(S);renderAll();}var d=new Date();var days=['So','Mo','Di','Mi','Do','Fr','Sa'];var mon=['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];document.getElementById('dl').textContent=days[d.getDay()]+' '+d.getDate()+'. '+mon[d.getMonth()];renderAll();</script></body></html>
