<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lottes Runden 🐾</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;600&display=swap');
  :root {
    --bg:#F7F2EB; --card:#FFF; --accent:#8B6020; --accent2:#C4873A;
    --text:#1E1A14; --muted:#8A7D6A; --border:rgba(139,96,32,.15);
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);min-height:100vh;padding:1.5rem 1rem 3rem;}
  h1{font-family:'Playfair Display',serif;font-size:1.8rem;color:var(--accent);text-align:center;margin-bottom:.2rem;}
  .subtitle{text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:1.4rem;}
  .today-card{
    background:linear-gradient(135deg,#8B6020,#C4873A);
    border-radius:18px;padding:1.3rem 1.1rem;color:#fff;
    margin-bottom:1.4rem;box-shadow:0 8px 24px rgba(139,96,32,.3);
    position:relative;overflow:hidden;
  }
  .today-card::before{content:'🐾';position:absolute;right:.8rem;top:.6rem;font-size:3rem;opacity:.2;pointer-events:none;}
  .today-label{font-size:.68rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;opacity:.8;margin-bottom:.25rem;}
  .today-day{font-family:'Playfair Display',serif;font-size:1.35rem;margin-bottom:.5rem;}
  .today-route{font-size:.84rem;line-height:1.8;opacity:.95;margin-bottom:.9rem;}
  .arr{color:rgba(255,255,255,.6);margin:0 .2rem;}
  .arr-dark{color:var(--accent2);margin:0 .2rem;}
  .btn-row{display:flex;gap:.6rem;flex-wrap:wrap;}
  .btn-maps{
    background:#fff;color:var(--accent);border:none;border-radius:30px;
    padding:.5rem 1.1rem;font-size:.82rem;font-weight:700;
    font-family:'DM Sans',sans-serif;cursor:pointer;
    display:inline-flex;align-items:center;gap:.4rem;text-decoration:none;
  }
  .btn-speak{
    background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4);
    color:#fff;border-radius:30px;padding:.5rem 1.1rem;font-size:.82rem;font-weight:600;
    font-family:'DM Sans',sans-serif;cursor:pointer;
    display:inline-flex;align-items:center;gap:.4rem;
  }
  .days-grid{display:flex;flex-direction:column;gap:.7rem;}
  .day-card{background:var(--card);border-radius:14px;border:1.5px solid var(--border);overflow:hidden;}
  .day-card.today-day{border-color:var(--accent);box-shadow:0 4px 16px rgba(139,96,32,.15);}
  .day-header{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1rem;cursor:pointer;}
  .day-left{display:flex;align-items:center;gap:.6rem;}
  .day-name{font-weight:600;font-size:.92rem;}
  .day-tag{font-size:.65rem;background:var(--bg);color:var(--muted);border-radius:20px;padding:.12rem .55rem;font-weight:600;}
  .today-day .day-tag{background:var(--accent);color:#fff;}
  .day-dur{font-size:.72rem;color:var(--muted);}
  .chevron{color:var(--muted);font-size:.75rem;transition:transform .2s;display:inline-block;}
  .day-card.open .chevron{transform:rotate(180deg);}
  .day-body{display:none;padding:0 1rem .9rem;}
  .day-card.open .day-body{display:block;}
  .route-text{font-size:.83rem;line-height:1.9;color:var(--text);margin-bottom:.75rem;}
  .btn-row-small{display:flex;gap:.5rem;flex-wrap:wrap;}
  .btn-maps-small{
    background:var(--accent);color:#fff;border:none;border-radius:20px;
    padding:.4rem .95rem;font-size:.75rem;font-weight:700;
    font-family:'DM Sans',sans-serif;cursor:pointer;
    display:inline-flex;align-items:center;gap:.35rem;text-decoration:none;
  }
  .btn-speak-small{
    background:var(--bg);border:1.5px solid var(--border);color:var(--accent);
    border-radius:20px;padding:.4rem .95rem;font-size:.75rem;font-weight:600;
    font-family:'DM Sans',sans-serif;cursor:pointer;
    display:inline-flex;align-items:center;gap:.35rem;
  }
  .tip{text-align:center;font-size:.72rem;color:var(--muted);margin-top:1.4rem;line-height:1.6;}
</style>
</head>
<body>

<h1>Lottes Runden 🐾</h1>
<p class="subtitle">Magdalenenstraße 4 · 1060 Wien</p>

<div class="today-card">
  <div class="today-label">Heute</div>
  <div class="today-day" id="todayDay">–</div>
  <div class="today-route" id="todayRoute">–</div>
  <div class="btn-row">
    <a id="btnMapsToday" href="#" target="_blank" class="btn-maps">🗺 Google Maps</a>
    <button class="btn-speak" id="btnSpeakToday" onclick="speakToday()">🔊 Vorlesen</button>
  </div>
</div>

<div class="days-grid" id="daysGrid"></div>

<p class="tip">Tippe auf einen Tag zum Aufklappen<br>🗺 öffnet Google Maps mit Navigation · 🔊 liest die Route vor</p>

<script>
var ROUTES = [
  {
    day:'Montag', short:'Mo', dur:'20 Min', dow:1,
    text:'Magdalenenstr. → Linke Wienzeile → Naschpark entlang → Kettenbrückengasse → Stiegengasse → Magdalenenstr.',
    speak:'Montags-Runde, 20 Minuten. Geh aus der Magdalenenstraße zur Linken Wienzeile. Dann den Naschpark entlang bis zur Kettenbrückengasse. Weiter durch die Stiegengasse zurück zur Magdalenenstraße.',
    maps:'https://www.google.com/maps/dir/Magdalenenstra%C3%9Fe+4,+1060+Wien/Linke+Wienzeile,+1060+Wien/Naschpark,+1050+Wien/Kettenbr%C3%BCckengasse,+1050+Wien/Stiegengasse,+1060+Wien/Magdalenenstra%C3%9Fe+4,+1060+Wien/@48.1964,16.355,15z/am=t/data=!4m2!4m1!3e2'
  },
  {
    day:'Dienstag', short:'Di', dur:'25 Min', dow:2,
    text:'Magdalenenstr. → Millergasse → Esterházypark außen → Fillgradergasse → Laimgrubengasse → Magdalenenstr.',
    speak:'Dienstags-Runde, 25 Minuten. Geh aus der Magdalenenstraße in die Millergasse. Den Esterházypark außen umgehen. Weiter durch die ruhige Fillgradergasse und die Laimgrubengasse zurück zur Magdalenenstraße.',
    maps:'https://www.google.com/maps/dir/Magdalenenstra%C3%9Fe+4,+1060+Wien/Millergasse,+1060+Wien/Esterh%C3%A1zypark,+1060+Wien/Fillgradergasse,+1060+Wien/Laimgrubengasse,+1060+Wien/Magdalenenstra%C3%9Fe+4,+1060+Wien/@48.197,16.353,15z/am=t/data=!4m2!4m1!3e2'
  },
  {
    day:'Mittwoch', short:'Mi', dur:'20 Min', dow:3,
    text:'Magdalenenstr. → Windmühlgasse → Amerlingstraße → Therapiepark → Luftbadgasse → Millergasse → Magdalenenstr.',
    speak:'Mittwochs-Runde, 20 Minuten. Geh aus der Magdalenenstraße in die Windmühlgasse. Weiter durch die Amerlingstraße zum Therapiepark. Dann durch die ruhige Luftbadgasse und die Millergasse zurück zur Magdalenenstraße.',
    maps:'https://www.google.com/maps/dir/Magdalenenstra%C3%9Fe+4,+1060+Wien/Windm%C3%BChlgasse,+1060+Wien/Amerlingstra%C3%9Fe,+1060+Wien/Mariahilfer+Ruhe+und+Therapiepark,+1060+Wien/Luftbadgasse,+1060+Wien/Millergasse,+1060+Wien/Magdalenenstra%C3%9Fe+4,+1060+Wien/@48.197,16.352,15z/am=t/data=!4m2!4m1!3e2'
  },
  {
    day:'Donnerstag', short:'Do', dur:'25 Min', dow:4,
    text:'Magdalenenstr. → Liniengasse → Stiegengasse → Theobaldgasse → Windmühlgasse → Magdalenenstr.',
    speak:'Donnerstags-Runde, 25 Minuten. Ruhige Gassen-Runde. Geh aus der Magdalenenstraße in die Liniengasse. Weiter durch die Stiegengasse und die Theobaldgasse. Dann durch die Windmühlgasse zurück zur Magdalenenstraße.',
    maps:'https://www.google.com/maps/dir/Magdalenenstra%C3%9Fe+4,+1060+Wien/Liniengasse,+1060+Wien/Stiegengasse,+1060+Wien/Theobaldgasse,+1060+Wien/Windm%C3%BChlgasse,+1060+Wien/Magdalenenstra%C3%9Fe+4,+1060+Wien/@48.198,16.355,15z/am=t/data=!4m2!4m1!3e2'
  },
  {
    day:'Freitag', short:'Fr', dur:'20 Min', dow:5,
    text:'Magdalenenstr. → Rechte Wienzeile → Alfred-Grünwald-Park außen → Kettenbrückengasse → Magdalenenstr.',
    speak:'Freitags-Runde, 20 Minuten. Geh aus der Magdalenenstraße zur Rechten Wienzeile. Den Alfred-Grünwald-Park außen entlanggehen. Weiter bis zur Kettenbrückengasse zurück zur Magdalenenstraße.',
    maps:'https://www.google.com/maps/dir/Magdalenenstra%C3%9Fe+4,+1060+Wien/Rechte+Wienzeile,+1050+Wien/Alfred-Gr%C3%BCnwald-Park,+1060+Wien/Kettenbr%C3%BCckengasse,+1050+Wien/Magdalenenstra%C3%9Fe+4,+1060+Wien/@48.196,16.357,15z/am=t/data=!4m2!4m1!3e2'
  },
  {
    day:'Samstag', short:'Sa', dur:'30 Min', dow:6,
    text:'Magdalenenstr. → Esterházygasse → Otto-Bauer-Gasse → Getreidemarkt → Resselpark außen → Operngasse → Linke Wienzeile → Magdalenenstr.',
    speak:'Samstags-Runde, 30 Minuten. Geh aus der Magdalenenstraße in die Esterházygasse. Weiter durch die Otto-Bauer-Gasse zum Getreidemarkt. Den Resselpark außen umgehen. Dann durch die Operngasse und die Linke Wienzeile zurück zur Magdalenenstraße.',
    maps:'https://www.google.com/maps/dir/Magdalenenstra%C3%9Fe+4,+1060+Wien/Esterh%C3%A1zygasse,+1060+Wien/Otto-Bauer-Gasse,+1060+Wien/Getreidemarkt,+1060+Wien/Resselpark,+1040+Wien/Operngasse,+1010+Wien/Linke+Wienzeile,+1060+Wien/Magdalenenstra%C3%9Fe+4,+1060+Wien/@48.198,16.36,15z/am=t/data=!4m2!4m1!3e2'
  },
  {
    day:'Sonntag', short:'So', dur:'30 Min', dow:0,
    text:'Magdalenenstr. → Linke Wienzeile → Matzleinsdorf → Schönbrunner Str. → Magdalenenstr.',
    speak:'Sonntags-Runde, 30 Minuten. Gemütliche Runde. Geh aus der Magdalenenstraße auf die Linke Wienzeile in Richtung Matzleinsdorf. Dann durch die Schönbrunner Straße zurück zur Magdalenenstraße.',
    maps:'https://www.google.com/maps/dir/Magdalenenstra%C3%9Fe+4,+1060+Wien/Linke+Wienzeile+44,+1060+Wien/Linke+Wienzeile+80,+1050+Wien/Sch%C3%B6nbrunner+Stra%C3%9Fe+55,+1050+Wien/Magdalenenstra%C3%9Fe+4,+1060+Wien/@48.193,16.352,15z/am=t/data=!4m2!4m1!3e2'
  }
];

var currentSpeakText = null;

function formatRoute(text, light) {
  var cl = light ? 'arr' : 'arr-dark';
  return text.split('→').map(function(s,i){
    return i===0 ? '<span>'+s.trim()+'</span>' : '<span class="'+cl+'">→</span><span>'+s.trim()+'</span>';
  }).join('');
}

function speakText(text, btn) {
  if (!window.speechSynthesis) { alert('Sprachausgabe nicht verfügbar'); return; }
  if (currentSpeakText === text) {
    window.speechSynthesis.cancel();
    currentSpeakText = null;
    if (btn) btn.innerHTML = btn.innerHTML.replace('⏹ Stop','🔊 Vorlesen');
    return;
  }
  window.speechSynthesis.cancel();
  currentSpeakText = text;
  var utt = new SpeechSynthesisUtterance(text);
  utt.lang = 'de-AT';
  utt.rate = 0.9;
  if (btn) btn.innerHTML = btn.innerHTML.replace('🔊 Vorlesen','⏹ Stop');
  utt.onend = function() {
    currentSpeakText = null;
    if (btn) btn.innerHTML = btn.innerHTML.replace('⏹ Stop','🔊 Vorlesen');
  };
  window.speechSynthesis.speak(utt);
}

function speakToday() {
  var r = getTodayRoute();
  speakText(r.speak, document.getElementById('btnSpeakToday'));
}

function getTodayRoute() {
  var dow = new Date().getDay();
  for (var i=0; i<ROUTES.length; i++) {
    if (ROUTES[i].dow === dow) return ROUTES[i];
  }
  return ROUTES[0];
}

function toggleCard(card) {
  card.classList.toggle('open');
}

function init() {
  var today = getTodayRoute();
  var dow = new Date().getDay();

  document.getElementById('todayDay').textContent = today.day + ' · ' + today.dur;
  document.getElementById('todayRoute').innerHTML = formatRoute(today.text, true);
  document.getElementById('btnMapsToday').href = today.maps;

  var grid = document.getElementById('daysGrid');
  ROUTES.forEach(function(r) {
    var isToday = r.dow === dow;
    var card = document.createElement('div');
    card.className = 'day-card' + (isToday ? ' today-day open' : '');
    card.innerHTML =
      '<div class="day-header" onclick="toggleCard(this.parentElement)">' +
        '<div class="day-left">' +
          '<span class="day-name">' + r.day + '</span>' +
          '<span class="day-tag">' + (isToday ? 'Heute' : r.short) + '</span>' +
        '</div>' +
        '<div style="display:flex;align-items:center;gap:.6rem">' +
          '<span class="day-dur">' + r.dur + '</span>' +
          '<span class="chevron">▼</span>' +
        '</div>' +
      '</div>' +
      '<div class="day-body">' +
        '<div class="route-text">' + formatRoute(r.text, false) + '</div>' +
        '<div class="btn-row-small">' +
          '<a href="' + r.maps + '" target="_blank" class="btn-maps-small">🗺 Google Maps</a>' +
          '<button class="btn-speak-small" data-speak="' + r.speak.replace(/"/g,'&quot;') + '" onclick="speakText(this.dataset.speak, this)">🔊 Vorlesen</button>' +
        '</div>' +
      '</div>';
    grid.appendChild(card);
  });
}

init();
</script>
</body>
</html>
